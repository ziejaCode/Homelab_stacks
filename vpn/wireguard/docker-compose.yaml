services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy
    restart: unless-stopped
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    volumes:
      - /mnt/tank/docker/vpn/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    environment:
      - WG_PORT=51820
      - PORT=51821
      - PASSWORD_HASH=$$2a$$10$$HbtQCWurCM83IC/czNMm1eNUGLma2E7c6jd6SXU1LtjnzXX2AfB4a
      - WG_HOST=89.100.220.65
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_MTU=1420
      - WG_ALLOWED_IPS=192.168.0.0/24
      - INSECURE=true
      - UI_TRAFFIC_STATS=true
    container_name: wg-easy

  