services:
  drawio:
    image: jgraph/drawio
    container_name: drawio
    restart: unless-stopped
    ports:
      - 31018:8080
    networks:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drawio.entrypoints=http"
      - "traefik.http.routers.drawio.rule=Host(`drawio.ziejacode.com`)"
      - "traefik.http.middlewares.drawio-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.drawio.middlewares=drawio-https-redirect"
      - "traefik.http.routers.drawio-secure.entrypoints=https"
      - "traefik.http.routers.drawio-secure.rule=Host(`drawio.ziejacode.com`)"
      - "traefik.http.routers.drawio-secure.tls=true"
      - "traefik.http.routers.drawio-secure.service=drawio"
      - "traefik.http.services.drawio.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      #- "traefik.http.routers.dozzle-secure.middlewares=authelia@docker"

networks:
  proxy:
    external: true