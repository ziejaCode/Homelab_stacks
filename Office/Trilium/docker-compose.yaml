version: '2.1'
services:
  trilium:
    container_name: trilium
    image: zadam/trilium
    restart: always
    environment:
      - TRILIUM_DATA_DIR=/home/node/trilium-data
    volumes:
      - /mnt/tank/docker/office/trilium:/home/node/trilium-data
    networks:
      - proxy
    ports:
      - 31019:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trilium.entrypoints=http"
      - "traefik.http.routers.trilium.rule=Host(`trilium.ziejacode.com`)"
      - "traefik.http.middlewares.trilium-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.trilium.middlewares=trilium-https-redirect"
      - "traefik.http.routers.trilium-secure.entrypoints=https"
      - "traefik.http.routers.trilium-secure.rule=Host(`trilium.ziejacode.com`)"
      - "traefik.http.routers.trilium-secure.tls=true"
      - "traefik.http.routers.trilium-secure.service=trilium"
      - "traefik.http.services.trilium.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.dozzle-secure.middlewares=authelia@docker"

networks:
  proxy:
    external: true