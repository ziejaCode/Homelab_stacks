services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    #env_file:
     # - .env
    environment:
      - VPN_SERVICE_PROVIDER=expressvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=sardasu4krb1y5ziy3qwntp7
      - OPENVPN_PASSWORD=lpsdecpwcobaev2k183uzz9j
      - SERVER_COUNTRIES=Ireland
      - TZ=Europe/Dublin 
      - FIREWALL=on
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/16
  
    ports:
      - "8085:8085" 
    volumes:
      - /mnt/tank/docker/arrstack/gluetun:/gluetun
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.ziejacode.com`)"
      - "traefik.http.routers.qbittorrent.entrypoints=https"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.tls.certresolver=cloudflare"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8085"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=3000
      - PGID=3000
      - TZ=Europe/Dublin
      - WEBUI_PORT=8085
    volumes:
      - /mnt/tank/docker/arrstack/qbittorrent/config:/config
      - /mnt/morpheus/Media:/downloads
    

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=3000
      - PGID=3000
      - TZ=Europe/Dublin
    volumes:
      - /mnt/tank/docker/arrstack/sonarr/config:/config
      - /mnt/morpheus/Media/Video/TVShows:/tv
      - /mnt/morpheus/Downloads:/downloads
    ports:
      - 31022:8089
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.ziejacode.com`)"
      - "traefik.http.routers.sonarr.entrypoints=https"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certresolver=cloudflare"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=3000
      - PGID=3000
      - TZ=Europe/Dublin
    volumes:
      - /mnt/tank/docker/arrstack/radarr/config:/config
      - /mnt/morpheus/Media/Video/Movies:/movies
      - /mnt/morpheus/Downloads:/downloads
    #ports:
    #  - 31023:8080
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.radarr.rule=Host(`radarr.ziejacode.com`)"
      - "traefik.http.routers.radarr.entrypoints=https"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=cloudflare"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=3000
      - PGID=3000
      - TZ=Europe/Dublin
    volumes:
      - /mnt/tank/docker/arrstack/prowlarr/config:/config
    #ports:
    #  - 31024:8080
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.ziejacode.com`)"
      - "traefik.http.routers.prowlarr.entrypoints=https"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.tls.certresolver=cloudflare"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - TZ=Europe/Dublin
    volumes:
      - /mnt/tank/docker/arrstack/jellyfin/config:/config
      - /mnt/tank/docker/arrstack/jellyfin/cache:/cache
      - /mnt/morpheus/Media/Video/Movies:/movies:ro
      - /mnt/morpheus/Media/Video/StudyVideo:/study:ro
      - /mnt/morpheus/Media/Video/TVShow:/tv:ro
      - /mnt/morpheus/Music:/music:ro
    #ports:
    #  - 31025:8080
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.ziejacode.com`)"
      - "traefik.http.routers.jellyfin.entrypoints=https"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      - PUID=3000
      - PGID=3000
      - TZ=Europe/Dublin
      - HOMEPAGE_ALLOWED_HOSTS=homepage.ziejacode.com
    volumes:
      - /mnt/tank/docker/arrstack/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 31026:8080
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.homepage.rule=Host(`homepage.ziejacode.com`)"
      - "traefik.http.routers.homepage.entrypoints=https"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.routers.homepage.tls.certresolver=cloudflare"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
  vpn:
    driver: bridge